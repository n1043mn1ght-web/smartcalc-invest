<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SmartCalc Invest — Wealth Projection Engine</title>
    <meta name="description" content="Calculate investment growth with inflation adjustment. Professional utility by SmartCalc.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; text-align: left; }
        .main-input { width: 100%; padding: 12px; border: 1px solid #D1D5DB; border-radius: 8px; background: #F9FAFB; }
        .main-input:focus { border-color: #10B981; outline: none; background: white; }
    </style>
</head>
<body class="bg-[#F3F4F6] text-[#111827] text-left">
    <header class="bg-[#064E3B] text-white py-6 shadow-lg text-left">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center text-left">
            <div class="flex items-center space-x-3 cursor-pointer text-left" onclick="location.reload()">
                <div class="w-10 h-10 bg-white rounded flex items-center justify-center">
                    <span class="text-[#064E3B] font-bold text-2xl">↑</span>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">SmartCalc <span class="font-light text-emerald-200 text-lg italic text-left">Invest</span></h1>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-12 text-left">
        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6 text-left">
                <div class="bg-white rounded-xl shadow-sm border p-8 text-left">
                    <h2 class="text-2xl font-bold text-[#064E3B] mb-6 text-left border-b pb-4">Wealth Projection</h2>
                    <div class="grid md:grid-cols-2 gap-6 text-left">
                        <div><label class="block text-xs font-bold mb-2">Initial Invest ($)</label><input type="number" id="principal" value="10000" oninput="calculate()" class="main-input"></div>
                        <div><label class="block text-xs font-bold mb-2">Monthly Addition ($)</label><input type="number" id="monthly" value="500" oninput="calculate()" class="main-input"></div>
                        <div><label class="block text-xs font-bold mb-2 text-left">Return Rate (%)</label><input type="number" id="rate" value="8" step="0.1" oninput="calculate()" class="main-input"></div>
                        <div><label class="block text-xs font-bold mb-2 text-left">Years</label><input type="number" id="years" value="10" oninput="calculate()" class="main-input"></div>
                    </div>
                    <div class="mt-8 pt-6 border-t flex items-center justify-between text-left">
                        <span class="text-sm font-bold">Inflation Adjustment (3%)</span>
                        <input type="checkbox" id="inflation-toggle" onchange="calculate()" class="w-5 h-5 accent-emerald-500">
                    </div>
                </div>
            </div>
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-xl border-t-8 border-[#10B981] p-8 sticky top-28 text-center">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Future Balance</p>
                    <div id="main-result" class="text-4xl font-bold text-[#064E3B] mb-2">$0</div>
                    <p id="inflation-note" class="text-xs text-emerald-600 font-medium hidden">Adjusted for Inflation</p>
                </div>
            </div>
        </div>
    </main>
    <footer class="mt-20 py-10 text-center text-xs text-gray-400 border-t bg-white text-center">© 2025 SmartCalc Invest.</footer>

    <script>
        function calculate() {
            const principal = parseFloat(document.getElementById('principal').value) || 0;
            const monthly = parseFloat(document.getElementById('monthly').value) || 0;
            let rateInput = parseFloat(document.getElementById('rate').value) || 0;
            const years = parseFloat(document.getElementById('years').value) || 0;
            const isInfl = document.getElementById('inflation-toggle').checked;
            
            let rate = (isInfl ? ((1 + (rateInput/100))/(1 + 0.03) - 1) : (rateInput/100)) / 12;
            const months = years * 12;

            let futureValue = principal * Math.pow(1 + rate, months);
            if (rate > 0) futureValue += monthly * (Math.pow(1 + rate, months) - 1) / rate;
            else futureValue += months * monthly;

            document.getElementById('main-result').innerText = '$' + Math.round(futureValue).toLocaleString();
            document.getElementById('inflation-note').classList.toggle('hidden', !isInfl);
        }
        window.onload = calculate;
    </script>
</body>
</html>
